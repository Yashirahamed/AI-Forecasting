version: '3.8'

services:
  ml-service:
    build: ./ml-service
    container_name: weathercast-ml-service
    ports:
      - "8000:8000"
    environment:
      - PORT=8000

  backend:
    build: ./backend
    container_name: weathercast-backend
    ports:
      - "5000:5000"
    depends_on:
      - ml-service
    environment:
      - ML_SERVICE_URL=http://ml-service:8000

  frontend:
    build: ./frontend
    container_name: weathercast-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
